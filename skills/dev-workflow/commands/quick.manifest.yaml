phase_id: Q

hooks_fired:
  - event: PreToolUse
    matcher: "Write|Edit|MultiEdit"
  - event: PreToolUse
    matcher: "Bash"
  - event: PostToolUse
    matcher: "Bash"
  - event: PostToolUse
    matcher: "Agent"
  - event: SubagentStop
    matcher: ""
  - event: Stop
    matcher: ""

agents_invoked:
  - ai-sdlc-developer
  - ai-sdlc-reviewer

read_set:
  - .claude/context/provider-config.md
  - .claude/context/language-config.md
  - .claude/context/naming-config.md
  - .claude/context/repos-paths.md
  - .claude/context/repos-metadata.md
  - .claude/context/quick-mode-config.md
  - ai/<date>-quick-<id>/tracker.md

writes:
  - ai/<date>-quick-<id>/tracker.md

gate_id: GATE-3
