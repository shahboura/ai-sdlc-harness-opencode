phase_id: P3

hooks_fired:
  - event: PreToolUse
    matcher: "Write|Edit|MultiEdit"
  - event: PreToolUse
    matcher: "Bash"
  - event: PostToolUse
    matcher: "Bash"
  - event: PostToolUse
    matcher: "Agent"
  - event: SubagentStop
    matcher: ""
  - event: SubagentStart
    matcher: "ai-sdlc-tester"

agents_invoked:
  - ai-sdlc-developer
  - ai-sdlc-reviewer

read_set:
  - .claude/context/provider-config.md
  - .claude/context/language-config.md
  - .claude/context/conventions.md
  - .claude/context/repos-paths.md
  - .claude/context/repos-metadata.md
  - ai/<date>-<id>/plan.md
  - ai/<date>-<id>/tracker.md

writes:
  - ai/<date>-<id>/tracker.md
