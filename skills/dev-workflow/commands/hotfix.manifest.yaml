phase_id: P3-hotfix

hooks_fired:
  - event: PreToolUse
    matcher: "Write|Edit|MultiEdit"
  - event: PreToolUse
    matcher: "Bash"
  - event: PostToolUse
    matcher: "Bash"
  - event: PostToolUse
    matcher: "Agent"
  - event: SubagentStop
    matcher: ""

agents_invoked:
  - ai-sdlc-developer
  - ai-sdlc-reviewer

read_set:
  - .claude/context/language-config.md
  - .claude/context/repos-paths.md
  - ai/<date>-<id>/plan.md
  - ai/<date>-<id>/tracker.md

writes:
  - ai/<date>-<id>/tracker.md
