# CI matrix — the suite, schema validation, and the line-budget/duplication
# sweep on every push/PR. All three OS lanes are enforcing. The Windows lane
# had its first real triage in 2026-07 (290 -> 0 failures): the blind-written
# msvcrt/9009/harness.cmd assumptions were replaced with measured behavior,
# fake-CLI stubs became real PE launchers (tests/support.py), and the guard
# layer grew nt-scoped path handling — see CHANGELOG [Unreleased].
name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install runtime deps
        run: python -m pip install --quiet pyyaml
      - name: Install opencode plugin TypeScript deps
        working-directory: .opencode
        run: npm ci
      - name: Git identity for repo-fixture tests
        run: |
          git config --global user.email "ci@ci"
          git config --global user.name "ci"
          git config --global init.defaultBranch main
      - name: Validate declared data
        run: python -m harness.schema
      - name: Line budget + duplication sweep
        run: python tools/budget_check.py
      - name: Test suite
        run: python -m unittest discover -s tests -v
