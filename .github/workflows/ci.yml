# CI matrix — the suite, schema validation, and the line-budget/duplication
# sweep on every push/PR. macOS + Linux are expected-green; the Windows lane
# is informational (continue-on-error) until its first real triage: the
# msvcrt lock fallback / harness.cmd / 9009 checks were written blind, and
# the fake-CLI provider stubs rely on shebang execution Windows doesn't do.
# Flip continue-on-error off once that lane has been made honest.
name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.14"]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install runtime deps
        run: python -m pip install --quiet pyyaml
      - name: Git identity for repo-fixture tests
        run: |
          git config --global user.email "ci@ci"
          git config --global user.name "ci"
          git config --global init.defaultBranch main
      - name: Validate declared data
        run: python -m harness.schema
      - name: Line budget + duplication sweep
        run: python tools/budget_check.py
      - name: Test suite
        run: python -m unittest discover -s tests -v
