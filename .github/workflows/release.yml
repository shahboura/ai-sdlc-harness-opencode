# Release — npm publish on version tags (Trusted Publisher / OIDC)
#
# Trigger: git tag v<semver> && git push origin v<semver>
#
# Prerequisites:
#   1. Configure a Trusted Publisher in the npm package's settings:
#      https://www.npmjs.com/settings/<owner>/packages/<name>/features
#      Set "GitHub Actions" as the publisher with:
#        - Owner:  <repo-owner>
#        - Repo:   <repo-name>
#        - Workflow: release.yml
#   2. No NPM_TOKEN secret needed — auth is handled via OIDC.
#
# Tags:    v*          -> npm publish
# Dry-run: v*-alpha*   -> npm publish --dry-run (safety gate for pre-releases)

name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed for creating a GitHub Release
      id-token: write     # needed for npm Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install opencode plugin deps
        working-directory: .opencode
        run: npm ci

      - name: Validate npm packaging
        run: npm pack --dry-run

      - name: Dry-run pre-release tags
        if: contains(github.ref_name, '-')
        run: npm publish --dry-run --provenance

      - name: Publish to npm
        if: ${{ !contains(github.ref_name, '-') }}
        run: npm publish --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
